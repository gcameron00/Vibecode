            <path d="M4.5,0 C4.5,17.9 24,27.5 24,27.5 C24,27.5 43.5,17.9 43.5,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M7,0 C7,16.25 24,25 24,25 C24,25 41,16.25 41,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M9.5,0 C9.5,14.6 24,22.5 24,22.5 C24,22.5 38.5,14.6 38.5,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M12,0 C12,13 24,20 24,20 C24,20 36,13 36,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M14.5,0 C14.5,11.4 24,17.5 24,17.5 C24,17.5 33.5,11.4 33.5,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M17,0 C17,9.75 24,15 24,15 C24,15 31,9.75 31,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M19.5,0 C19.5,8.1 24,12.5 24,12.5 C24,12.5 28.5,8.1 28.5,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          All About the Vibes
        </a>
        <nav>
          <a href="/about/">About</a>
          <a href="/feed.xml" class="rss-link" title="RSS Feed" aria-label="RSS Feed">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>

        </nav>
      </div>
    </header>

    <main class="container">
      <h1 class="page-heading">Posts</h1>
      <ul class="post-list" id="post-list">
        <li class="loading">Loading posts...</li>
      </ul>
    </main>

    <footer>
      <p>A blog about the journey with AI-assisted vibe coding.</p>
    </footer>

    <script>
      async function loadPosts() {
        const list = document.getElementById('post-list');
        try {
          const res = await fetch('/posts/index.json');
          if (!res.ok) throw new Error('Failed to load posts');
          const posts = await res.json();

          if (posts.length === 0) {
            list.innerHTML = '<li class="loading">No posts yet.</li>';
            return;
          }

          list.innerHTML = posts.map(post => `
            <li>
              <a href="/post/?slug=${encodeURIComponent(post.slug)}">
                <p class="post-title">${escapeHtml(post.title)}</p>
                <p class="post-meta">${formatDate(post.date)}</p>
                ${post.description ? `<p class="post-description">${escapeHtml(post.description)}</p>` : ''}
              </a>
            </li>
          `).join('');
        } catch (err) {
          list.innerHTML = '<li class="error">Could not load posts.</li>';
        }
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      loadPosts();
    </script>
  </body>
</html>
