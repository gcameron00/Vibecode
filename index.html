<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All About the Vibes</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="alternate" type="application/rss+xml" title="All About the Vibes" href="/feed.xml">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  </head>
  <body>
    <header id="site-header" class="header--expanded">
      <!-- Top bar: V mark (left), site name when collapsed (centre), nav (right) -->
      <div class="header-bar">
        <a href="/" class="logo-mark" aria-label="All About the Vibes">
          <svg class="v-mark" viewBox="0 0 84 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="vg" x1="0" y1="0" x2="84" y2="0" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#e879f9"/>
                <stop offset="50%" stop-color="#818cf8"/>
                <stop offset="100%" stop-color="#38bdf8"/>
              </linearGradient>
            </defs>
            <!-- Left arm leans outward; right arm has S-curve — asymmetric handwritten V -->
            <path d="M4,0 C-4,22 18,48 40,54 C68,64 80,16 72,0" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M6,0.5 C0,24 20,48.5 40,54 C66,62 78,18 70,1" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M8,1 C4,26 22,49 40,54 C64,60 76,20 68,2" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10,1.5 C8,28 24,49.5 40,54 C62,58 74,22 66,3" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M12,2 C12,30 26,50 40,54 C60,56 72,24 64,4" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M14,2.5 C16,32 28,50.5 40,54 C58,54 70,26 62,5" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M16,3 C20,34 30,51 40,54 C56,52 68,28 60,6" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M18,3.5 C24,36 32,51.5 40,54 C54,50 66,30 58,7" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M20,4 C28,38 34,52 40,54 C52,48 64,32 56,8" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M22,4.5 C32,40 36,52.5 40,54 C50,46 62,34 54,9" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </a>
        <span class="header-bar-title">All About the Vibes</span>
        <nav>
          <a href="/about/">About</a>
          <a href="/feed.xml" class="rss-link" title="RSS Feed" aria-label="RSS Feed">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>
            </svg>
          </a>
        </nav>
      </div>
      <!-- Hero title — visible when expanded, collapses on scroll -->
      <div class="header-hero">
        <a href="/" class="site-title-large">All About the <span class="vibes-word">Vibes</span></a>
      </div>
    </header>

    <main class="container">
      <h1 class="page-heading">Posts</h1>
      <ul class="post-list" id="post-list">
        <li class="loading">Loading posts...</li>
      </ul>
    </main>

    <footer>
      <p>A blog about the journey with AI-assisted vibe coding.</p>
    </footer>

    <script>
      async function loadPosts() {
        const list = document.getElementById('post-list');
        try {
          const res = await fetch('/posts/index.json');
          if (!res.ok) throw new Error('Failed to load posts');
          const posts = await res.json();

          if (posts.length === 0) {
            list.innerHTML = '<li class="loading">No posts yet.</li>';
            return;
          }

          list.innerHTML = posts.map(post => `
            <li>
              <a href="/post/?slug=${encodeURIComponent(post.slug)}">
                <p class="post-title">${escapeHtml(post.title)}</p>
                <p class="post-meta">${formatDate(post.date)}</p>
                ${post.description ? `<p class="post-description">${escapeHtml(post.description)}</p>` : ''}
              </a>
            </li>
          `).join('');
        } catch (err) {
          list.innerHTML = '<li class="error">Could not load posts.</li>';
        }
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      loadPosts();
    </script>

    <script>
      (function () {
        var header = document.getElementById('site-header');
        window.addEventListener('scroll', function () {
          if (window.scrollY > 30) {
            header.classList.add('header--collapsed');
            header.classList.remove('header--expanded');
          } else {
            header.classList.remove('header--collapsed');
            header.classList.add('header--expanded');
          }
        }, { passive: true });
      })();
    </script>
  </body>
</html>
