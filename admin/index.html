<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin | All About the Vibes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #ffffff;
        --surface: #f9fafb;
        --text: #1a1a1a;
        --muted: #6b7280;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --border: #e5e7eb;
        --error: #dc2626;
        --success: #16a34a;
        --max-width: 860px;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 0;
        font-size: 1rem;
        line-height: 1.6;
      }

      header {
        border-bottom: 1px solid var(--border);
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .site-title {
        font-weight: 700;
        font-size: 1rem;
        text-decoration: none;
        color: var(--text);
      }

      .admin-label {
        font-size: 0.8125rem;
        color: var(--muted);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.2em 0.6em;
      }

      .container {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }

      /* Mode tabs */
      .mode-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 2rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        width: fit-content;
      }

      .mode-tab {
        padding: 0.5rem 1.25rem;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        background: var(--surface);
        color: var(--muted);
        transition: background 0.15s, color 0.15s;
      }

      .mode-tab:first-child { border-right: 1px solid var(--border); }

      .mode-tab.active {
        background: var(--accent);
        color: #fff;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 2rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 0.375rem;
        color: var(--text);
      }

      .label-hint {
        font-weight: 400;
        color: var(--muted);
        margin-left: 0.375rem;
      }

      input[type="text"],
      input[type="date"],
      input[type="password"],
      input[type="url"],
      select {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 0.9375rem;
        font-family: inherit;
        color: var(--text);
        background: var(--bg);
        outline: none;
        transition: border-color 0.15s;
        appearance: none;
      }

      input:focus, select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      }

      .slug-preview {
        font-size: 0.8125rem;
        color: var(--muted);
        margin-top: 0.375rem;
      }

      .slug-preview code {
        font-family: 'Menlo', 'Monaco', monospace;
        background: var(--surface);
        padding: 0.1em 0.35em;
        border-radius: 3px;
        font-size: 0.875em;
      }

      /* Cover image upload */
      .cover-upload-area {
        border: 2px dashed var(--border);
        border-radius: 8px;
        padding: 1.5rem;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        position: relative;
      }

      .cover-upload-area:hover {
        border-color: var(--accent);
        background: #eff6ff;
      }

      .cover-upload-area input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }

      .cover-upload-label {
        font-size: 0.875rem;
        color: var(--muted);
        pointer-events: none;
      }

      .cover-preview {
        margin-top: 0.75rem;
        display: none;
      }

      .cover-preview img {
        max-height: 180px;
        border-radius: 6px;
        object-fit: cover;
        max-width: 100%;
      }

      .cover-preview-name {
        font-size: 0.8125rem;
        color: var(--muted);
        margin-top: 0.375rem;
      }

      /* Project-only fields */
      .project-fields { display: none; }
      .project-fields.visible { display: block; }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      @media (max-width: 580px) {
        .two-col { grid-template-columns: 1fr; }
      }

      /* Buttons */
      .button-row {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        margin-top: 1.75rem;
      }

      button {
        padding: 0.5625rem 1.25rem;
        border-radius: 6px;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: background 0.15s, opacity 0.15s;
      }

      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-secondary {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover { background: var(--border); }

      /* Status */
      .status {
        margin-top: 1.25rem;
        padding: 0.75rem 1rem;
        border-radius: 6px;
        font-size: 0.9375rem;
        display: none;
      }

      .status.success {
        background: #f0fdf4;
        color: var(--success);
        border: 1px solid #bbf7d0;
        display: block;
      }

      .status.error {
        background: #fef2f2;
        color: var(--error);
        border: 1px solid #fecaca;
        display: block;
      }

      /* Settings panel */
      .settings-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.25rem;
        margin-bottom: 2rem;
      }

      .settings-panel summary {
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        color: var(--muted);
        user-select: none;
      }

      .settings-panel summary:hover { color: var(--text); }

      .settings-fields {
        margin-top: 1rem;
        display: grid;
        gap: 0.875rem;
      }

      .settings-note {
        font-size: 0.8125rem;
        color: var(--muted);
        margin-top: 0.5rem;
      }

      .settings-note a { color: var(--accent); }

      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2rem 0;
      }

      /* EasyMDE tweaks */
      .CodeMirror {
        font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
        font-size: 0.9rem;
        min-height: 360px;
        border-radius: 0 0 6px 6px;
        color: var(--text);
      }

      .editor-toolbar {
        border-radius: 6px 6px 0 0;
        border-color: var(--border);
      }

      .editor-toolbar button { color: var(--text) !important; }

      .editor-statusbar {
        font-size: 0.75rem;
        color: var(--muted);
      }

      .upload-status {
        font-size: 0.8125rem;
        color: var(--muted);
        margin-top: 0.375rem;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/" class="site-title">All About the Vibes</a>
      <span class="admin-label">Admin</span>
    </header>

    <main class="container">

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode('post')">New Post</button>
        <button class="mode-tab" onclick="setMode('project')">New Project</button>
      </div>

      <!-- Settings -->
      <details class="settings-panel" id="settings-panel">
        <summary>GitHub Settings</summary>
        <div class="settings-fields">
          <div class="form-group" style="margin:0">
            <label>Personal Access Token <span class="label-hint">(stored in browser)</span></label>
            <input type="password" id="gh-token" placeholder="ghp_..." />
            <p class="settings-note">
              Needs <strong>Contents: Read &amp; Write</strong> permission.
              <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Create a fine-grained token</a>
            </p>
          </div>
          <div class="form-group" style="margin:0">
            <label>Repository</label>
            <input type="text" id="gh-repo" placeholder="owner/repo" />
          </div>
          <button class="btn-secondary" onclick="saveSettings()" style="width:fit-content">Save settings</button>
        </div>
      </details>

      <!-- Form -->
      <form id="post-form" onsubmit="handleSubmit(event)">

        <h1 id="form-heading">New Post</h1>

        <!-- Shared fields -->
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="My Post Title" required oninput="updateSlug()" />
          <p class="slug-preview">Slug: <code id="slug-display">my-post-title</code></p>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" required />
        </div>

        <div class="form-group">
          <label for="description">Description <span class="label-hint">(shown on overview)</span></label>
          <input type="text" id="description" placeholder="A short summary." />
        </div>

        <!-- Project-only fields -->
        <div class="project-fields" id="project-fields">
          <hr />

          <div class="form-group">
            <label>Cover Image <span class="label-hint">(optional)</span></label>
            <div class="cover-upload-area" id="cover-upload-area">
              <input type="file" id="cover-image-input" accept="image/*" onchange="handleCoverImagePick(event)" />
              <p class="cover-upload-label">Click to choose a cover image</p>
            </div>
            <div class="cover-preview" id="cover-preview">
              <img id="cover-preview-img" src="" alt="Cover preview" />
              <p class="cover-preview-name" id="cover-preview-name"></p>
            </div>
          </div>

          <div class="two-col">
            <div class="form-group">
              <label for="tech">Tech Stack <span class="label-hint">(comma separated)</span></label>
              <input type="text" id="tech" placeholder="Swift, SwiftUI, CloudKit" />
            </div>
            <div class="form-group">
              <label for="status">Status</label>
              <select id="status">
                <option value="In Progress">In Progress</option>
                <option value="Live">Live</option>
                <option value="On hold">On hold</option>
                <option value="Archived">Archived</option>
              </select>
            </div>
          </div>

          <div class="two-col">
            <div class="form-group">
              <label for="project-url">Live URL <span class="label-hint">(optional)</span></label>
              <input type="url" id="project-url" placeholder="https://example.com" />
            </div>
            <div class="form-group">
              <label for="repo-url">Repo URL <span class="label-hint">(optional)</span></label>
              <input type="url" id="repo-url" placeholder="https://github.com/..." />
            </div>
          </div>
        </div>

        <hr />

        <div class="form-group">
          <label>Body</label>
          <textarea id="body" placeholder="Write in markdown..."></textarea>
          <p class="upload-status" id="upload-status"></p>
        </div>

        <div class="button-row">
          <button type="submit" class="btn-primary" id="publish-btn">Publish</button>
          <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
        </div>
      </form>

      <div class="status" id="status"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script>
      const STORAGE_KEY = 'vibecode_admin';
      let currentMode = 'post';
      let pendingCoverImageFile = null;
      let publishedCoverImageUrl = null;

      // --- EasyMDE ---

      const easyMDE = new EasyMDE({
        element: document.getElementById('body'),
        spellChecker: false,
        autosave: { enabled: false },
        placeholder: 'Write in markdown...',
        toolbar: [
          'bold', 'italic', 'heading', '|',
          'quote', 'unordered-list', 'ordered-list', '|',
          'link', 'upload-image', '|',
          'preview', 'side-by-side', 'fullscreen', '|',
          'guide'
        ],
        imageUploadFunction: uploadBodyImage,
        imageTexts: {
          sbInit: 'Attach images by dragging & dropping or clicking the toolbar button.',
          sbOnDragEnter: 'Drop image to upload.',
          sbOnDrop: 'Uploading image…',
          sbProgress: 'Uploading image: #progress#%',
          sbOnUploaded: 'Uploaded image.',
        },
      });

      // --- Mode ---

      function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-tab').forEach((tab, i) => {
          tab.classList.toggle('active', (i === 0 && mode === 'post') || (i === 1 && mode === 'project'));
        });
        document.getElementById('project-fields').classList.toggle('visible', mode === 'project');
        document.getElementById('form-heading').textContent = mode === 'post' ? 'New Post' : 'New Project';
        document.getElementById('publish-btn').textContent = 'Publish';
        clearStatus();
      }

      // --- Settings ---

      function loadSettings() {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (saved.token) document.getElementById('gh-token').value = saved.token;
        document.getElementById('gh-repo').value = saved.repo || 'gcameron00/Vibecode';
        if (saved.token && saved.repo) {
          document.getElementById('settings-panel').removeAttribute('open');
        } else {
          document.getElementById('settings-panel').setAttribute('open', '');
        }
      }

      function saveSettings() {
        const token = document.getElementById('gh-token').value.trim();
        const repo  = document.getElementById('gh-repo').value.trim();
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ token, repo }));
        document.getElementById('settings-panel').removeAttribute('open');
        showStatus('Settings saved.', 'success');
      }

      function getSettings() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      }

      // --- Slug ---

      function toSlug(title) {
        return title
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, '')
          .trim()
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-');
      }

      function updateSlug() {
        const title = document.getElementById('title').value;
        document.getElementById('slug-display').textContent = toSlug(title) || (currentMode === 'project' ? 'my-project' : 'my-post-title');
      }

      // --- Cover image picker ---

      function handleCoverImagePick(e) {
        const file = e.target.files[0];
        if (!file) return;
        pendingCoverImageFile = file;
        publishedCoverImageUrl = null;

        const reader = new FileReader();
        reader.onload = function (ev) {
          document.getElementById('cover-preview-img').src = ev.target.result;
          document.getElementById('cover-preview-name').textContent = file.name;
          document.getElementById('cover-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }

      async function uploadCoverImage(token, repo, slug) {
        if (!pendingCoverImageFile) return null;
        const ext      = pendingCoverImageFile.name.split('.').pop().toLowerCase();
        const filename = `${slug}-cover.${ext}`;
        const path     = `projects/images/${filename}`;

        setUploadStatus('Uploading cover image…');
        const base64 = await fileToBase64(pendingCoverImageFile);
        await ghPut(token, repo, path, base64, `Add image: ${filename}`, null, true);
        setUploadStatus('');
        return `/${path}`;
      }

      // --- GitHub API ---

      async function ghGet(token, repo, path) {
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
          headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
        });
        if (!res.ok) throw new Error(`GitHub GET failed: ${res.status} ${res.statusText}`);
        return res.json();
      }

      async function ghPut(token, repo, path, content, message, sha, isBinary = false) {
        const encoded = isBinary ? content : btoa(unescape(encodeURIComponent(content)));
        const body = { message, content: encoded };
        if (sha) body.sha = sha;
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
          method: 'PUT',
          headers: {
            Authorization: `token ${token}`,
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `GitHub PUT failed: ${res.status}`);
        }
        return res.json();
      }

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      // --- Body image upload (called by EasyMDE) ---

      function uploadBodyImage(file, onSuccess, onError) {
        const { token, repo } = getSettings();
        if (!token || !repo) {
          onError('Configure GitHub settings before uploading images.');
          return;
        }

        const ext      = file.name.split('.').pop().toLowerCase();
        const prefix   = currentMode === 'project' ? 'projects' : 'posts';
        const slug     = toSlug(document.getElementById('title').value) || 'untitled';
        const filename = `${slug}-${Date.now()}.${ext}`;
        const path     = `${prefix}/images/${filename}`;

        setUploadStatus(`Uploading ${file.name}…`);

        fileToBase64(file).then(base64 =>
          ghPut(token, repo, path, base64, `Add image: ${filename}`, null, true)
        ).then(() => {
          setUploadStatus('');
          onSuccess(`/${path}`);
        }).catch(err => {
          setUploadStatus('');
          onError(err.message);
        });
      }

      function setUploadStatus(msg) {
        document.getElementById('upload-status').textContent = msg;
      }

      // --- Submit ---

      async function handleSubmit(e) {
        e.preventDefault();
        if (currentMode === 'project') {
          await publishProject();
        } else {
          await publishPost();
        }
      }

      async function publishPost() {
        const { token, repo } = getSettings();
        if (!token || !repo) {
          showStatus('Please fill in your GitHub settings above first.', 'error');
          document.getElementById('settings-panel').setAttribute('open', '');
          return;
        }

        const title       = document.getElementById('title').value.trim();
        const date        = document.getElementById('date').value;
        const description = document.getElementById('description').value.trim();
        const body        = easyMDE.value();
        const slug        = toSlug(title);

        if (!slug) { showStatus('Could not generate a slug from the title.', 'error'); return; }
        if (!body.trim()) { showStatus('Post body cannot be empty.', 'error'); return; }

        setPublishing(true);

        try {
          const mdContent = [
            '---',
            `title: ${title}`,
            `date: ${date}`,
            description ? `description: ${description}` : null,
            '---',
            '',
            body,
          ].filter(l => l !== null).join('\n');

          await ghPut(token, repo, `posts/${slug}.md`, mdContent, `Add post: ${title}`);

          const { posts: currentPosts, sha: indexSha } = await fetchIndex(token, repo, 'posts/index.json');
          const newEntry = { slug, title, date };
          if (description) newEntry.description = description;
          const updatedPosts = [newEntry, ...currentPosts.filter(p => p.slug !== slug)];
          await ghPut(token, repo, 'posts/index.json', JSON.stringify(updatedPosts, null, 2) + '\n', `Update post index: add ${slug}`, indexSha);

          showStatus('Post published. Cloudflare will redeploy in a moment.', 'success');
          clearForm();
        } catch (err) {
          showStatus(`Error: ${err.message}`, 'error');
        } finally {
          setPublishing(false);
        }
      }

      async function publishProject() {
        const { token, repo } = getSettings();
        if (!token || !repo) {
          showStatus('Please fill in your GitHub settings above first.', 'error');
          document.getElementById('settings-panel').setAttribute('open', '');
          return;
        }

        const title       = document.getElementById('title').value.trim();
        const date        = document.getElementById('date').value;
        const description = document.getElementById('description').value.trim();
        const tech        = document.getElementById('tech').value.trim();
        const status      = document.getElementById('status').value;
        const url         = document.getElementById('project-url').value.trim();
        const repoUrl     = document.getElementById('repo-url').value.trim();
        const body        = easyMDE.value();
        const slug        = toSlug(title);

        if (!slug) { showStatus('Could not generate a slug from the title.', 'error'); return; }

        setPublishing(true);

        try {
          // Upload cover image first if one was picked
          const imageUrl = await uploadCoverImage(token, repo, slug);

          const frontmatterLines = [
            '---',
            `title: ${title}`,
            `date: ${date}`,
            description ? `description: ${description}` : null,
            imageUrl    ? `image: ${imageUrl}`          : null,
            tech        ? `tech: ${tech}`               : null,
            `status: ${status}`,
            url         ? `url: ${url}`                 : null,
            repoUrl     ? `repo: ${repoUrl}`            : null,
            '---',
            '',
            body,
          ].filter(l => l !== null).join('\n');

          await ghPut(token, repo, `projects/${slug}.md`, frontmatterLines, `Add project: ${title}`);

          const { posts: currentProjects, sha: indexSha } = await fetchIndex(token, repo, 'projects/index.json');
          const newEntry = { slug, title, date };
          if (description) newEntry.description = description;
          if (imageUrl)    newEntry.image        = imageUrl;
          if (tech)        newEntry.tech         = tech;
          newEntry.status = status;
          const updatedProjects = [newEntry, ...currentProjects.filter(p => p.slug !== slug)];
          await ghPut(token, repo, 'projects/index.json', JSON.stringify(updatedProjects, null, 2) + '\n', `Update project index: add ${slug}`, indexSha);

          showStatus('Project published. Cloudflare will redeploy in a moment.', 'success');
          clearForm();
        } catch (err) {
          showStatus(`Error: ${err.message}`, 'error');
        } finally {
          setPublishing(false);
        }
      }

      async function fetchIndex(token, repo, path) {
        try {
          const file = await ghGet(token, repo, path);
          const posts = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g, '')))));
          return { posts, sha: file.sha };
        } catch (_) {
          return { posts: [], sha: null };
        }
      }

      function setPublishing(on) {
        const btn = document.getElementById('publish-btn');
        btn.disabled = on;
        btn.textContent = on ? 'Publishing…' : 'Publish';
        if (on) clearStatus();
      }

      // --- Helpers ---

      function clearForm() {
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        document.getElementById('tech').value = '';
        document.getElementById('status').value = 'In Progress';
        document.getElementById('project-url').value = '';
        document.getElementById('repo-url').value = '';
        document.getElementById('cover-image-input').value = '';
        document.getElementById('cover-preview').style.display = 'none';
        pendingCoverImageFile = null;
        publishedCoverImageUrl = null;
        easyMDE.value('');
        document.getElementById('slug-display').textContent = currentMode === 'project' ? 'my-project' : 'my-post-title';
        setTodayDate();
      }

      function setTodayDate() {
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('date').value = today;
      }

      function showStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = `status ${type}`;
      }

      function clearStatus() {
        document.getElementById('status').className = 'status';
      }

      // Init
      loadSettings();
      setTodayDate();
    </script>
  </body>
</html>
