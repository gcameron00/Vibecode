<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin | All About the Vibes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #ffffff;
        --surface: #f9fafb;
        --text: #1a1a1a;
        --muted: #6b7280;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --border: #e5e7eb;
        --error: #dc2626;
        --success: #16a34a;
        --max-width: 860px;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0; padding: 0;
        font-size: 1rem;
        line-height: 1.6;
      }

      header {
        border-bottom: 1px solid var(--border);
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .site-title { font-weight: 700; font-size: 1rem; text-decoration: none; color: var(--text); }

      .admin-label {
        font-size: 0.8125rem; color: var(--muted);
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 4px; padding: 0.2em 0.6em;
      }

      .container { max-width: var(--max-width); margin: 0 auto; padding: 2rem 1.5rem; }

      /* Tabs */
      .mode-tabs {
        display: flex;
        margin-bottom: 2rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        width: fit-content;
      }

      .mode-tab {
        padding: 0.5rem 1.25rem;
        font-size: 0.9375rem; font-weight: 600;
        cursor: pointer; border: none;
        background: var(--surface); color: var(--muted);
        transition: background 0.15s, color 0.15s;
        border-right: 1px solid var(--border);
      }

      .mode-tab:last-child { border-right: none; }
      .mode-tab.active { background: var(--accent); color: #fff; }

      /* Entry picker bar */
      .entry-bar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.75rem;
      }

      .entry-bar select { flex: 1; margin: 0; }

      .btn-refresh {
        padding: 0.5rem 0.875rem;
        background: var(--surface); color: var(--muted);
        border: 1px solid var(--border); border-radius: 6px;
        font-size: 0.875rem; font-weight: 600;
        cursor: pointer; white-space: nowrap;
        transition: background 0.15s, color 0.15s;
      }

      .btn-refresh:hover { background: var(--border); color: var(--text); }

      h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 1.5rem; }

      .edit-notice {
        display: none;
        font-size: 0.875rem; color: #92400e;
        background: #fefce8; border: 1px solid #fde68a;
        border-radius: 6px; padding: 0.5rem 0.875rem;
        margin-bottom: 1.5rem;
      }

      .edit-notice.visible { display: block; }

      .form-group { margin-bottom: 1.25rem; }

      label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.375rem; color: var(--text); }
      .label-hint { font-weight: 400; color: var(--muted); margin-left: 0.375rem; }

      input[type="text"],
      input[type="date"],
      input[type="password"],
      input[type="url"],
      select {
        width: 100%; padding: 0.5rem 0.75rem;
        border: 1px solid var(--border); border-radius: 6px;
        font-size: 0.9375rem; font-family: inherit;
        color: var(--text); background: var(--bg);
        outline: none; transition: border-color 0.15s;
        appearance: none;
      }

      input:focus, select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      }

      input[readonly] { background: var(--surface); color: var(--muted); cursor: default; }

      .slug-preview { font-size: 0.8125rem; color: var(--muted); margin-top: 0.375rem; }
      .slug-preview code {
        font-family: 'Menlo', 'Monaco', monospace;
        background: var(--surface); padding: 0.1em 0.35em;
        border-radius: 3px; font-size: 0.875em;
      }

      /* Cover image */
      .cover-upload-area {
        border: 2px dashed var(--border); border-radius: 8px;
        padding: 1.5rem; text-align: center; cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        position: relative;
      }

      .cover-upload-area:hover { border-color: var(--accent); background: #eff6ff; }

      .cover-upload-area input[type="file"] {
        position: absolute; inset: 0; opacity: 0;
        cursor: pointer; width: 100%; height: 100%;
      }

      .cover-upload-label { font-size: 0.875rem; color: var(--muted); pointer-events: none; }

      .cover-preview { margin-top: 0.75rem; display: none; }
      .cover-preview img { max-height: 180px; border-radius: 6px; object-fit: cover; max-width: 100%; }
      .cover-preview-name { font-size: 0.8125rem; color: var(--muted); margin-top: 0.375rem; }

      /* Project-only fields */
      .project-fields { display: none; }
      .project-fields.visible { display: block; }

      .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      @media (max-width: 580px) { .two-col { grid-template-columns: 1fr; } }

      /* Buttons */
      .button-row { display: flex; gap: 0.75rem; align-items: center; margin-top: 1.75rem; }

      button {
        padding: 0.5625rem 1.25rem; border-radius: 6px;
        font-size: 0.9375rem; font-weight: 600;
        cursor: pointer; border: none;
        transition: background 0.15s, opacity 0.15s;
      }

      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
      .btn-secondary:hover { background: var(--border); }

      /* Status */
      .status {
        margin-top: 1.25rem; padding: 0.75rem 1rem;
        border-radius: 6px; font-size: 0.9375rem; display: none;
      }

      .status.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; display: block; }
      .status.error   { background: #fef2f2; color: var(--error);   border: 1px solid #fecaca; display: block; }

      /* Settings tab */
      .settings-tab-panel { display: none; }
      .settings-tab-panel.visible { display: block; }
      .settings-fields { display: grid; gap: 0.875rem; max-width: 480px; }
      .settings-note { font-size: 0.8125rem; color: var(--muted); margin-top: 0.5rem; }
      .settings-note a { color: var(--accent); }

      hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

      /* EasyMDE */
      .CodeMirror {
        font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
        font-size: 0.9rem; min-height: 360px;
        border-radius: 0 0 6px 6px; color: var(--text);
      }

      .editor-toolbar { border-radius: 6px 6px 0 0; border-color: var(--border); }
      .editor-toolbar button { color: var(--text) !important; }
      .editor-statusbar { font-size: 0.75rem; color: var(--muted); }

      .upload-status { font-size: 0.8125rem; color: var(--muted); margin-top: 0.375rem; min-height: 1.2em; }
    </style>
  </head>
  <body>
    <header>
      <a href="/" class="site-title">All About the Vibes</a>
      <span class="admin-label">Admin</span>
    </header>

    <main class="container">

      <!-- Tabs: Posts | Projects | Settings -->
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setTab('post')">Posts</button>
        <button class="mode-tab"        onclick="setTab('project')">Projects</button>
        <button class="mode-tab"        onclick="setTab('settings')">Settings</button>
      </div>

      <!-- Settings tab panel -->
      <div class="settings-tab-panel" id="settings-tab-panel">
        <h1>Settings</h1>
        <div class="settings-fields">
          <div class="form-group">
            <label>Personal Access Token <span class="label-hint">(stored in browser)</span></label>
            <input type="password" id="gh-token" placeholder="ghp_..." />
            <p class="settings-note">
              Needs <strong>Contents: Read &amp; Write</strong> permission.
              <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Create a fine-grained token</a>
            </p>
          </div>
          <div class="form-group">
            <label>Repository</label>
            <input type="text" id="gh-repo" placeholder="owner/repo" />
          </div>
          <button class="btn-primary" onclick="saveSettings()" style="width:fit-content">Save settings</button>
        </div>
      </div>

      <!-- Main form (Posts & Projects tabs) -->
      <div id="main-panel">

        <!-- Entry picker -->
        <div class="entry-bar">
          <select id="entry-select" onchange="onEntryChange()">
            <option value="__new__">New Post</option>
          </select>
          <button class="btn-refresh" onclick="refreshEntryList()" title="Refresh list">&#8635;</button>
        </div>

        <form id="post-form" onsubmit="handleSubmit(event)">

          <h1 id="form-heading">New Post</h1>
          <div class="edit-notice" id="edit-notice">Editing existing entry — slug is locked. Saving will set the updated date automatically.</div>

          <!-- Shared fields -->
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Title" required oninput="onFormChange(); updateSlug()" />
            <p class="slug-preview">Slug: <code id="slug-display">new-post</code></p>
          </div>

          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required oninput="onFormChange()" />
          </div>

          <div class="form-group">
            <label for="description">Description <span class="label-hint">(shown on overview)</span></label>
            <input type="text" id="description" placeholder="A short summary." oninput="onFormChange()" />
          </div>

          <!-- Project-only fields -->
          <div class="project-fields" id="project-fields">
            <hr />

            <div class="form-group">
              <label>Cover Image <span class="label-hint">(optional)</span></label>
              <div class="cover-upload-area">
                <input type="file" id="cover-image-input" accept="image/*" onchange="handleCoverImagePick(event)" />
                <p class="cover-upload-label" id="cover-upload-label">Click to choose a cover image</p>
              </div>
              <div class="cover-preview" id="cover-preview">
                <img id="cover-preview-img" src="" alt="Cover preview" />
                <p class="cover-preview-name" id="cover-preview-name"></p>
              </div>
            </div>

            <div class="two-col">
              <div class="form-group">
                <label for="tech">Tech Stack <span class="label-hint">(comma separated)</span></label>
                <input type="text" id="tech" placeholder="Swift, SwiftUI" oninput="onFormChange()" />
              </div>
              <div class="form-group">
                <label for="proj-status">Status</label>
                <select id="proj-status" onchange="onFormChange()">
                  <option value="In Progress">In Progress</option>
                  <option value="Live">Live</option>
                  <option value="On hold">On hold</option>
                  <option value="Archived">Archived</option>
                </select>
              </div>
            </div>

            <div class="two-col">
              <div class="form-group">
                <label for="project-url">Live URL <span class="label-hint">(optional)</span></label>
                <input type="url" id="project-url" placeholder="https://example.com" oninput="onFormChange()" />
              </div>
              <div class="form-group">
                <label for="repo-url">Repo URL <span class="label-hint">(optional)</span></label>
                <input type="url" id="repo-url" placeholder="https://github.com/..." oninput="onFormChange()" />
              </div>
            </div>
          </div>

          <hr />

          <div class="form-group">
            <label>Body</label>
            <textarea id="body" placeholder="Write in markdown..."></textarea>
            <p class="upload-status" id="upload-status"></p>
          </div>

          <div class="button-row">
            <button type="submit" class="btn-primary" id="publish-btn">Publish</button>
            <button type="button" class="btn-secondary" onclick="resetForm()">Clear</button>
          </div>
        </form>
      </div>

      <div class="status" id="status"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script>
      const STORAGE_KEY = 'vibecode_admin';

      let currentTab   = 'post';    // 'post' | 'project' | 'settings'
      let isEditing    = false;
      let editingSlug  = null;
      let editingMdSha = null;
      let existingImage = null;
      let pendingCoverImageFile = null;
      let isDirty = false;          // unsaved changes flag

      // -----------------------------------------------------------------------
      // EasyMDE
      // -----------------------------------------------------------------------

      const easyMDE = new EasyMDE({
        element: document.getElementById('body'),
        spellChecker: false,
        autosave: { enabled: false },
        placeholder: 'Write in markdown...',
        toolbar: [
          'bold', 'italic', 'heading', '|',
          'quote', 'unordered-list', 'ordered-list', '|',
          'link', 'upload-image', '|',
          'preview', 'side-by-side', 'fullscreen', '|',
          'guide'
        ],
        imageUploadFunction: uploadBodyImage,
        imageTexts: {
          sbInit: 'Attach images by dragging & dropping or clicking the toolbar button.',
          sbOnDragEnter: 'Drop image to upload.',
          sbOnDrop: 'Uploading image…',
          sbProgress: 'Uploading image: #progress#%',
          sbOnUploaded: 'Uploaded image.',
        },
      });

      easyMDE.codemirror.on('change', onFormChange);

      // -----------------------------------------------------------------------
      // Tabs
      // -----------------------------------------------------------------------

      function setTab(tab) {
        if (tab === currentTab) return;

        // Dirty check when leaving a form tab
        if (currentTab !== 'settings' && isDirty) {
          if (!confirm('You have unsaved changes. Leave anyway?')) return;
        }

        currentTab = tab;

        document.querySelectorAll('.mode-tab').forEach((el, i) => {
          el.classList.toggle('active',
            (i === 0 && tab === 'post') ||
            (i === 1 && tab === 'project') ||
            (i === 2 && tab === 'settings')
          );
        });

        const isSettings = tab === 'settings';
        document.getElementById('settings-tab-panel').classList.toggle('visible', isSettings);
        document.getElementById('main-panel').style.display = isSettings ? 'none' : 'block';
        document.getElementById('project-fields').classList.toggle('visible', tab === 'project');

        if (!isSettings) {
          resetForm();
          refreshEntryList();   // auto-populate on tab switch
        }

        clearStatus();
      }

      // -----------------------------------------------------------------------
      // Entry picker
      // -----------------------------------------------------------------------

      async function refreshEntryList() {
        const select = document.getElementById('entry-select');
        const newLabel = currentTab === 'project' ? 'New Project' : 'New Post';
        select.innerHTML = `<option value="__new__">${newLabel}</option><option disabled>Loading…</option>`;

        const { token, repo } = getSettings();
        if (!token || !repo) {
          select.innerHTML = `<option value="__new__">${newLabel}</option><option disabled>⚠ Configure Settings first</option>`;
          return;
        }

        try {
          const indexPath = currentTab === 'project' ? 'projects/index.json' : 'posts/index.json';
          const { posts: entries } = await fetchIndex(token, repo, indexPath);
          select.innerHTML = `<option value="__new__">${newLabel}</option>` +
            (entries.length ? '<option disabled>──────────</option>' : '') +
            entries.map(e => `<option value="${e.slug}">${e.title}</option>`).join('');
        } catch (_) {
          select.innerHTML = `<option value="__new__">${newLabel}</option><option disabled>Failed to load entries</option>`;
        }
      }

      async function onEntryChange() {
        const slug = document.getElementById('entry-select').value;

        if (slug === '__new__') {
          if (isDirty && !confirm('You have unsaved changes. Clear the form?')) {
            // Revert dropdown to previously selected value
            document.getElementById('entry-select').value = editingSlug || '__new__';
            return;
          }
          resetForm();
          return;
        }

        // Switching to a different existing entry
        if (isDirty && !confirm('You have unsaved changes. Load the selected entry anyway?')) {
          document.getElementById('entry-select').value = editingSlug || '__new__';
          return;
        }

        await loadEntry(slug);
      }

      async function loadEntry(slug) {
        const { token, repo } = getSettings();
        if (!token || !repo) { promptSettings(); return; }

        const mdPath = currentTab === 'project' ? `projects/${slug}.md` : `posts/${slug}.md`;

        try {
          showStatus('Loading…', 'success');
          const file = await ghGet(token, repo, mdPath);
          const markdown = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
          const { meta, body } = parseFrontmatter(markdown);

          editingMdSha  = file.sha;
          isEditing     = true;
          editingSlug   = slug;
          isDirty       = false;

          // Heading & notice
          document.getElementById('form-heading').textContent = `Editing: ${meta.title || slug}`;
          document.getElementById('edit-notice').classList.add('visible');
          document.getElementById('publish-btn').textContent = 'Update';

          // Shared fields
          document.getElementById('title').value       = meta.title       || '';
          document.getElementById('date').value        = meta.date        || '';
          document.getElementById('description').value = meta.description || '';
          document.getElementById('slug-display').textContent = slug;
          document.getElementById('title').setAttribute('readonly', '');

          // Project fields
          if (currentTab === 'project') {
            document.getElementById('tech').value        = meta.tech   || '';
            document.getElementById('proj-status').value = meta.status || 'In Progress';
            document.getElementById('project-url').value = meta.url    || '';
            document.getElementById('repo-url').value    = meta.repo   || '';

            existingImage = meta.image || null;
            if (existingImage) {
              document.getElementById('cover-preview-img').src = existingImage;
              document.getElementById('cover-preview-name').textContent = 'Current cover image';
              document.getElementById('cover-preview').style.display = 'block';
              document.getElementById('cover-upload-label').textContent = 'Click to replace cover image';
            }
          }

          easyMDE.value(body);
          isDirty = false; // reset after programmatic fill
          clearStatus();
        } catch (err) {
          showStatus(`Error loading: ${err.message}`, 'error');
        }
      }

      // -----------------------------------------------------------------------
      // Dirty tracking
      // -----------------------------------------------------------------------

      function onFormChange() {
        isDirty = true;
      }

      // -----------------------------------------------------------------------
      // Settings
      // -----------------------------------------------------------------------

      function loadSettings() {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (saved.token) document.getElementById('gh-token').value = saved.token;
        document.getElementById('gh-repo').value = saved.repo || 'gcameron00/Vibecode';
        if (!saved.token || !saved.repo) setTab('settings');
      }

      function saveSettings() {
        const token = document.getElementById('gh-token').value.trim();
        const repo  = document.getElementById('gh-repo').value.trim();
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ token, repo }));
        showStatus('Settings saved.', 'success');
      }

      function getSettings() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      }

      // -----------------------------------------------------------------------
      // Slug
      // -----------------------------------------------------------------------

      function toSlug(str) {
        return str.toLowerCase()
          .replace(/[^a-z0-9\s-]/g, '').trim()
          .replace(/\s+/g, '-').replace(/-+/g, '-');
      }

      function updateSlug() {
        if (isEditing) return;
        const title = document.getElementById('title').value;
        document.getElementById('slug-display').textContent =
          toSlug(title) || (currentTab === 'project' ? 'new-project' : 'new-post');
      }

      // -----------------------------------------------------------------------
      // Cover image
      // -----------------------------------------------------------------------

      function handleCoverImagePick(e) {
        const file = e.target.files[0];
        if (!file) return;
        pendingCoverImageFile = file;
        onFormChange();
        const reader = new FileReader();
        reader.onload = ev => {
          document.getElementById('cover-preview-img').src = ev.target.result;
          document.getElementById('cover-preview-name').textContent = file.name;
          document.getElementById('cover-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }

      async function uploadCoverImage(token, repo, slug) {
        if (!pendingCoverImageFile) return null;
        const ext      = pendingCoverImageFile.name.split('.').pop().toLowerCase();
        const filename = `${slug}-cover.${ext}`;
        const path     = `projects/images/${filename}`;
        setUploadStatus('Uploading cover image…');
        const base64 = await fileToBase64(pendingCoverImageFile);
        await ghPut(token, repo, path, base64, `Add image: ${filename}`, null, true);
        setUploadStatus('');
        return `/${path}`;
      }

      // -----------------------------------------------------------------------
      // GitHub API
      // -----------------------------------------------------------------------

      async function ghGet(token, repo, path) {
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
          headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
        });
        if (!res.ok) throw new Error(`GitHub GET failed: ${res.status} ${res.statusText}`);
        return res.json();
      }

      async function ghPut(token, repo, path, content, message, sha, isBinary = false) {
        const encoded = isBinary ? content : btoa(unescape(encodeURIComponent(content)));
        const body = { message, content: encoded };
        if (sha) body.sha = sha;
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
          method: 'PUT',
          headers: {
            Authorization: `token ${token}`,
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `GitHub PUT failed: ${res.status}`);
        }
        return res.json();
      }

      async function fetchIndex(token, repo, path) {
        try {
          const file = await ghGet(token, repo, path);
          const data = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g, '')))));
          return { posts: data, sha: file.sha };
        } catch (_) {
          return { posts: [], sha: null };
        }
      }

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      // -----------------------------------------------------------------------
      // Body image upload (EasyMDE callback)
      // -----------------------------------------------------------------------

      function uploadBodyImage(file, onSuccess, onError) {
        const { token, repo } = getSettings();
        if (!token || !repo) { onError('Configure GitHub settings first.'); return; }
        const ext      = file.name.split('.').pop().toLowerCase();
        const prefix   = currentTab === 'project' ? 'projects' : 'posts';
        const slug     = editingSlug || toSlug(document.getElementById('title').value) || 'untitled';
        const filename = `${slug}-${Date.now()}.${ext}`;
        const path     = `${prefix}/images/${filename}`;
        setUploadStatus(`Uploading ${file.name}…`);
        fileToBase64(file)
          .then(base64 => ghPut(token, repo, path, base64, `Add image: ${filename}`, null, true))
          .then(() => { setUploadStatus(''); onSuccess(`/${path}`); })
          .catch(err  => { setUploadStatus(''); onError(err.message); });
      }

      function setUploadStatus(msg) {
        document.getElementById('upload-status').textContent = msg;
      }

      // -----------------------------------------------------------------------
      // Submit
      // -----------------------------------------------------------------------

      async function handleSubmit(e) {
        e.preventDefault();
        if (isEditing) {
          currentTab === 'project' ? await saveProject() : await savePost();
        } else {
          currentTab === 'project' ? await publishProject() : await publishPost();
        }
      }

      // --- Publish new post ---
      async function publishPost() {
        const { token, repo } = getSettings();
        if (!token || !repo) { promptSettings(); return; }

        const title       = document.getElementById('title').value.trim();
        const date        = document.getElementById('date').value;
        const description = document.getElementById('description').value.trim();
        const body        = easyMDE.value();
        const slug        = toSlug(title);

        if (!slug) { showStatus('Could not generate a slug from the title.', 'error'); return; }
        if (!body.trim()) { showStatus('Post body cannot be empty.', 'error'); return; }

        setPublishing(true);
        try {
          await ghPut(token, repo, `posts/${slug}.md`, buildPostMd({ title, date, description, body }), `Add post: ${title}`);
          const { posts, sha } = await fetchIndex(token, repo, 'posts/index.json');
          const entry = { slug, title, date };
          if (description) entry.description = description;
          await ghPut(token, repo, 'posts/index.json',
            JSON.stringify([entry, ...posts.filter(p => p.slug !== slug)], null, 2) + '\n',
            `Update post index: add ${slug}`, sha);
          showStatus('Post published. Cloudflare will redeploy in a moment.', 'success');
          resetForm();
          refreshEntryList();
        } catch (err) {
          showStatus(`Error: ${err.message}`, 'error');
        } finally {
          setPublishing(false);
        }
      }

      // --- Save edited post ---
      async function savePost() {
        const { token, repo } = getSettings();
        if (!token || !repo) { promptSettings(); return; }

        const title       = document.getElementById('title').value.trim();
        const date        = document.getElementById('date').value;
        const description = document.getElementById('description').value.trim();
        const body        = easyMDE.value();
        const today       = new Date().toISOString().slice(0, 10);

        if (!body.trim()) { showStatus('Post body cannot be empty.', 'error'); return; }

        setPublishing(true);
        try {
          await ghPut(token, repo, `posts/${editingSlug}.md`,
            buildPostMd({ title, date, description, body, updated: today }),
            `Update post: ${title}`, editingMdSha);
          const { posts, sha } = await fetchIndex(token, repo, 'posts/index.json');
          const idx = posts.findIndex(p => p.slug === editingSlug);
          const entry = { ...(idx >= 0 ? posts[idx] : {}), slug: editingSlug, title, date, updated: today };
          if (description) entry.description = description; else delete entry.description;
          if (idx >= 0) posts[idx] = entry; else posts.unshift(entry);
          await ghPut(token, repo, 'posts/index.json',
            JSON.stringify(posts, null, 2) + '\n', `Update post: ${editingSlug}`, sha);
          showStatus('Post saved. Cloudflare will redeploy in a moment.', 'success');
          isDirty = false;
        } catch (err) {
          showStatus(`Error: ${err.message}`, 'error');
        } finally {
          setPublishing(false);
        }
      }

      // --- Publish new project ---
      async function publishProject() {
        const { token, repo } = getSettings();
        if (!token || !repo) { promptSettings(); return; }

        const title       = document.getElementById('title').value.trim();
        const date        = document.getElementById('date').value;
        const description = document.getElementById('description').value.trim();
        const tech        = document.getElementById('tech').value.trim();
        const status      = document.getElementById('proj-status').value;
        const url         = document.getElementById('project-url').value.trim();
        const repoUrl     = document.getElementById('repo-url').value.trim();
        const body        = easyMDE.value();
        const slug        = toSlug(title);

        if (!slug) { showStatus('Could not generate a slug from the title.', 'error'); return; }

        setPublishing(true);
        try {
          const imageUrl = await uploadCoverImage(token, repo, slug);
          await ghPut(token, repo, `projects/${slug}.md`,
            buildProjectMd({ title, date, description, image: imageUrl, tech, status, url, repoUrl, body }),
            `Add project: ${title}`);
          const { posts: projects, sha } = await fetchIndex(token, repo, 'projects/index.json');
          const entry = { slug, title, date, status };
          if (description) entry.description = description;
          if (imageUrl)    entry.image        = imageUrl;
          if (tech)        entry.tech         = tech;
          await ghPut(token, repo, 'projects/index.json',
            JSON.stringify([entry, ...projects.filter(p => p.slug !== slug)], null, 2) + '\n',
            `Update project index: add ${slug}`, sha);
          showStatus('Project published. Cloudflare will redeploy in a moment.', 'success');
          resetForm();
          refreshEntryList();
        } catch (err) {
          showStatus(`Error: ${err.message}`, 'error');
        } finally {
          setPublishing(false);
        }
      }

      // --- Save edited project ---
      async function saveProject() {
        const { token, repo } = getSettings();
        if (!token || !repo) { promptSettings(); return; }

        const title       = document.getElementById('title').value.trim();
        const date        = document.getElementById('date').value;
        const description = document.getElementById('description').value.trim();
        const tech        = document.getElementById('tech').value.trim();
        const status      = document.getElementById('proj-status').value;
        const url         = document.getElementById('project-url').value.trim();
        const repoUrl     = document.getElementById('repo-url').value.trim();
        const body        = easyMDE.value();
        const today       = new Date().toISOString().slice(0, 10);

        setPublishing(true);
        try {
          const newImageUrl = await uploadCoverImage(token, repo, editingSlug);
          const imageUrl    = newImageUrl || existingImage;
          await ghPut(token, repo, `projects/${editingSlug}.md`,
            buildProjectMd({ title, date, description, image: imageUrl, tech, status, url, repoUrl, body, updated: today }),
            `Update project: ${title}`, editingMdSha);
          const { posts: projects, sha } = await fetchIndex(token, repo, 'projects/index.json');
          const idx = projects.findIndex(p => p.slug === editingSlug);
          const entry = { ...(idx >= 0 ? projects[idx] : {}), slug: editingSlug, title, date, updated: today, status };
          if (description) entry.description = description; else delete entry.description;
          if (imageUrl)    entry.image        = imageUrl;   else delete entry.image;
          if (tech)        entry.tech         = tech;       else delete entry.tech;
          if (idx >= 0) projects[idx] = entry; else projects.unshift(entry);
          await ghPut(token, repo, 'projects/index.json',
            JSON.stringify(projects, null, 2) + '\n', `Update project: ${editingSlug}`, sha);
          showStatus('Project saved. Cloudflare will redeploy in a moment.', 'success');
          isDirty = false;
        } catch (err) {
          showStatus(`Error: ${err.message}`, 'error');
        } finally {
          setPublishing(false);
        }
      }

      // -----------------------------------------------------------------------
      // Markdown builders
      // -----------------------------------------------------------------------

      function buildPostMd({ title, date, description, body, updated }) {
        return [
          '---',
          `title: ${title}`,
          `date: ${date}`,
          description ? `description: ${description}` : null,
          updated     ? `updated: ${updated}`         : null,
          '---', '', body,
        ].filter(l => l !== null).join('\n');
      }

      function buildProjectMd({ title, date, description, image, tech, status, url, repoUrl, body, updated }) {
        return [
          '---',
          `title: ${title}`,
          `date: ${date}`,
          description ? `description: ${description}` : null,
          image       ? `image: ${image}`             : null,
          tech        ? `tech: ${tech}`               : null,
          `status: ${status}`,
          url         ? `url: ${url}`                 : null,
          repoUrl     ? `repo: ${repoUrl}`            : null,
          updated     ? `updated: ${updated}`         : null,
          '---', '', body,
        ].filter(l => l !== null).join('\n');
      }

      function parseFrontmatter(markdown) {
        const match = markdown.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
        if (!match) return { meta: {}, body: markdown.trim() };
        const meta = {};
        match[1].split('\n').forEach(line => {
          const colon = line.indexOf(':');
          if (colon === -1) return;
          meta[line.slice(0, colon).trim()] = line.slice(colon + 1).trim();
        });
        return { meta, body: match[2].trim() };
      }

      // -----------------------------------------------------------------------
      // UI helpers
      // -----------------------------------------------------------------------

      function setPublishing(on) {
        const btn = document.getElementById('publish-btn');
        btn.disabled = on;
        btn.textContent = on ? 'Saving…' : (isEditing ? 'Update' : 'Publish');
        if (on) clearStatus();
      }

      function promptSettings() {
        showStatus('Please configure GitHub settings first.', 'error');
        setTab('settings');
      }

      function resetForm() {
        isEditing     = false;
        editingSlug   = null;
        editingMdSha  = null;
        existingImage = null;
        pendingCoverImageFile = null;
        isDirty = false;

        document.getElementById('title').value       = '';
        document.getElementById('date').value        = '';
        document.getElementById('description').value = '';
        document.getElementById('tech').value        = '';
        document.getElementById('proj-status').value = 'In Progress';
        document.getElementById('project-url').value = '';
        document.getElementById('repo-url').value    = '';
        document.getElementById('cover-image-input').value = '';
        document.getElementById('cover-preview').style.display = 'none';
        document.getElementById('cover-upload-label').textContent = 'Click to choose a cover image';
        document.getElementById('title').removeAttribute('readonly');
        document.getElementById('edit-notice').classList.remove('visible');
        document.getElementById('form-heading').textContent = currentTab === 'project' ? 'New Project' : 'New Post';
        document.getElementById('publish-btn').textContent = 'Publish';
        document.getElementById('slug-display').textContent = currentTab === 'project' ? 'new-project' : 'new-post';
        document.getElementById('entry-select').value = '__new__';

        easyMDE.value('');
        setTodayDate();
        isDirty = false; // reset again after programmatic clears
      }

      function setTodayDate() {
        document.getElementById('date').value = new Date().toISOString().slice(0, 10);
      }

      function showStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = `status ${type}`;
      }

      function clearStatus() {
        document.getElementById('status').className = 'status';
      }

      // -----------------------------------------------------------------------
      // Init
      // -----------------------------------------------------------------------

      loadSettings();
      setTodayDate();
      refreshEntryList();
    </script>
  </body>
