<!doctype html>

  <head>
    <meta charset="utf-8" />

    <link rel="alternate" type="application/rss+xml" title="All About the Vibes" href="/feed.xml">
  </head>
  <body>
    <header>
      <div class="container">
        <a href="/" class="site-title" aria-label="All About the Vibes">
          <svg class="v-mark" viewBox="0 0 48 34" width="36" height="26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="vg" x1="0" y1="0" x2="48" y2="0" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#e879f9"/>

                <stop offset="100%" stop-color="#38bdf8"/>
              </linearGradient>
            </defs>
            <path d="M2,0 C2,19.5 24,30 24,30 C24,30 46,19.5 46,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M4.5,0 C4.5,17.9 24,27.5 24,27.5 C24,27.5 43.5,17.9 43.5,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M7,0 C7,16.25 24,25 24,25 C24,25 41,16.25 41,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M9.5,0 C9.5,14.6 24,22.5 24,22.5 C24,22.5 38.5,14.6 38.5,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M12,0 C12,13 24,20 24,20 C24,20 36,13 36,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M14.5,0 C14.5,11.4 24,17.5 24,17.5 C24,17.5 33.5,11.4 33.5,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M17,0 C17,9.75 24,15 24,15 C24,15 31,9.75 31,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M19.5,0 C19.5,8.1 24,12.5 24,12.5 C24,12.5 28.5,8.1 28.5,0" stroke="url(#vg)" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          All About the Vibes
        </a>
        <nav>
          <a href="/about/">About</a>
          <a href="/feed.xml" class="rss-link" title="RSS Feed" aria-label="RSS Feed">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>
            </svg>
          </a>
        </nav>
      </div>
    </header>

    <main class="container">
      <a href="/" class="back-link">&larr; All posts</a>
      <div id="post-content">
        <p class="loading">Loading post...</p>
      </div>
    </main>

    <footer>
      <p>A blog about the journey with AI-assisted vibe coding.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      async function loadPost() {
        const container = document.getElementById('post-content');
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');

        if (!slug) {
          container.innerHTML = '<p class="error">No post specified.</p>';
          return;
        }

        try {
          // Load post manifest to get metadata
          const manifestRes = await fetch('/posts/index.json');
          const posts = manifestRes.ok ? await manifestRes.json() : [];
          const meta = posts.find(p => p.slug === slug);

          // Load markdown content
          const mdRes = await fetch(`/posts/${encodeURIComponent(slug)}.md`);
          if (!mdRes.ok) throw new Error('Post not found');
          const markdown = await mdRes.text();

          // Strip frontmatter if present
          const content = markdown.replace(/^---[\s\S]*?---\n/, '');

          const title = meta?.title || slug;
          const date = meta?.date ? formatDate(meta.date) : '';

          document.title = `${title} | All About the Vibes`;

          container.innerHTML = `
            <div class="post-header">
              <h1>${escapeHtml(title)}</h1>
              ${date ? `<p class="post-meta">${date}</p>` : ''}
            </div>
            <div class="prose">${marked.parse(content)}</div>
          `;
        } catch (err) {
          container.innerHTML = '<p class="error">Post could not be loaded.</p>';
        }
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      loadPost();
    </script>
  </body>
</html>
